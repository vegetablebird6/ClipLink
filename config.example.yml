# ClipLink 配置文件
# 此文件应与 cliplink 二进制文件放在同一目录下
# 默认使用 SQLite 数据库，无需任何配置即可运行

# 服务器配置（可选）
# host: "0.0.0.0"
# port: 8080

# 浏览器跨域配置（可选）
# 生产环境推荐通过同域名反向代理访问，一般不需要额外跨域来源。
# 如果前端和后端分属不同源，请只填写可信来源；也可用环境变量 CLIPLINK_ALLOWED_ORIGINS 覆盖。
# cors:
#   allowed_origins:
#     - "https://cliplink.example.com"
#     - "http://localhost:3000"

# 安全限制（可选）
# max_body_bytes 限制单个请求体大小，默认 2097152（2 MiB）。
# 如果需要同步较大的文本或 base64 内容，可按需调大；也可用环境变量 CLIPLINK_MAX_BODY_BYTES 覆盖。
# security:
#   max_body_bytes: 2097152
#   # 可选：配置后，创建新通道必须提供此实例 Token（请求头 X-Instance-Token）。
#   # 读写已有通道仍使用 X-Channel-ID。也可用环境变量 CLIPLINK_INSTANCE_TOKEN 覆盖。
#   instance_token: "replace-with-a-long-random-token"

# 日志配置（可选）
# sql 可选值：silent、error、warn、info；生产环境建议 warn 或 silent。
# 也可用环境变量 CLIPLINK_SQL_LOG 覆盖。
# log:
#   sql: warn

# MySQL 数据库配置（可选）
# 只有配置了完整的 MySQL 信息才会使用 MySQL，否则自动使用 SQLite
# mysql:
#   host: "localhost"
#   port: 3306
#   username: "cliplink"
#   password: "your_password"
#   database: "cliplink"
#   charset: "utf8mb4" 
